- name: filter the topics using the topics
  hosts: localhost
  become: true

  vars_files:
    - variables.yaml

  vars:
    topics: apple, banana, orange, graps

  tasks:
  - name: printing the topics
    debug:
      msg: "the topics are {{ topics.split(',') }}" 

  - name: print the default message
    debug:
      msg: "Hello, welcome Lokesh {{ message | default('Good Morning') }}"

  - name: convert map to list 
    debug: 
      msg: "{{ topics | dict2items }}"