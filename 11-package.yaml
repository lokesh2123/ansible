- name: check the distribution of the server
  hosts: localhost
  become: true

  vars_files:
    - variables.yaml

  vars_prompt:
  - name: NAME
    prompt: enter the server distribution
    private: no

  when: NAME == "Redhat"


  tasks:
    - name: check the which distribution for this server 
      debug:
        msg: "{{ ansible_distribution}}"