- name: even or add
  hosts: localhost
  become: true

  vars_files:
    - variables.yaml

  vars_prompt:
    - name: check the even or odd number
      number: value
      prompt: "enter the number to check even or odd : {{ value }}"
      private: no

  # vars: 
  #   number: 10
  
  tasks:
    - name: even
      debug:
        msg: "the given number {{ value }} is even"
      when: number % 2 == 0

    - name: odd
      debug:
        msg: "the given number {{ value }} is odd"
      when: number % 2 != 0
  