- name: even or add
  host: localhost
  become: true

  vars_files:
    - variables.yaml

  vars: 
    number: 10
  
  tasks:
    - name: check the number is even or odd
      debug:
        msg: "the given number is even"
      when: number % 2 == 0

    - name: check the number is even or odd
      debug:
        msg: "the given number is odd"
      when: number % 2 != 0

  