- name: provisioning the infrastructure
  hosts: local
  connection: local
  become: yes

  vars:
    instances: ["mongodb", "redis" ,"rabitmq" ,"mysqldb"]
    image_id: ami-0220d79f3f480ecf5
    zone_id: 

  tasks:
  - name: creating the instances
    amazon.aws.ec2_instance:
      name: "robo-{{ item }}"
      instance_type: t3.micro
      region: us-east-1
      image_id: "{{ image_id }}"
      security_groups:
        - "robo-{{ item }}"
        - robo-common 
    loop: "{{ instances }}"
    register: ec2_output

  - name: print the output
    debug:
      msg: "{{ ec2_output }}"

  - name: print the name and ip address
    debug:
      msg: "name of the instance: {{ item.item }}, private ip : {{ item.instances[0].private_ip_address }}"
    loop: "{{ ec2_output }}"

